name: auto-version

# main 有尚未发布的变更时递增 patch，并创建 tag 和 GitHub Release。
# 连续 push 按顺序排队；先执行的 run 会在最新 main 上合并发布未发布变更，
# 后续 run 若发现最新 main 已是 release commit 则安全退出。
# 回写 commit 带 [skip ci]，避免自己触发自己（死循环）。

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-version
  cancel-in-progress: false
  queue: max

jobs:
  validate:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validator dependencies
        run: python3 -m pip install --disable-pip-version-check --quiet PyYAML==6.0.2
      - name: Validate manifests, skills, README, and fixtures
        run: python3 scripts/validate.py

  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward and revalidate latest main
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main --tags
          git reset --hard origin/main
          python3 -m pip install --disable-pip-version-check --quiet PyYAML==6.0.2
          python3 scripts/validate.py

          cur=$(jq -r .version .claude-plugin/plugin.json)
          tag="v${cur}"
          if git log -1 --format=%s | grep -Fq '[skip ci]'; then
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null && ! gh release view "$tag" >/dev/null 2>&1; then
              echo "action=recover" >> "$GITHUB_OUTPUT"
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
            else
              echo "action=none" >> "$GITHUB_OUTPUT"
              echo "最新 main 已发布，无需重复递增版本。"
            fi
          else
            echo "action=publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.prepare.outputs.action == 'publish'
        id: bump
        run: |
          file=.claude-plugin/plugin.json
          cur=$(jq -r .version "$file")
          IFS=. read -r major minor patch <<< "$cur"
          new="${major}.${minor}.$((patch + 1))"
          tmp=$(mktemp)
          jq --arg v "$new" '.version = $v' "$file" > "$tmp" && mv "$tmp" "$file"
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"
          echo "版本 $cur → $new"

      - name: Commit and atomically push branch with tag
        if: steps.prepare.outputs.action == 'publish'
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore(release): ${TAG} [skip ci]"
          git tag "$TAG"
          git push --atomic origin HEAD:main "refs/tags/${TAG}"

      - name: Create or recover GitHub Release
        if: steps.prepare.outputs.action == 'publish' || steps.prepare.outputs.action == 'recover'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TAG: ${{ steps.bump.outputs.tag }}
          RECOVER_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          tag="${PUBLISH_TAG:-$RECOVER_TAG}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
